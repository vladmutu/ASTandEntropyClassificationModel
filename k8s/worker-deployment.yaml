apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          image: malware-classifier/worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MODEL_PATH
              value: /app/lightgbm_model.pkl
            - name: THRESHOLD_PATH
              value: /app/lightgbm_threshold.pkl
            - name: DOWNLOAD_TIMEOUT
              value: "30"
          # /tmp is writable for archive extraction; everything else is read-only
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: tmp
          emptyDir: {}
